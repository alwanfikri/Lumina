<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lumina</title>

<link rel="icon" href="./icon-192.png">

<link rel="stylesheet" href="./style.css">

<link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">

</head>

<body>

<div id="splash" class="splash">

<div class="splash-logo">

<div class="splash-mark">✦</div>

<h1 class="splash-title">Lumina</h1>

<p class="splash-sub">Your productivity hub</p>

</div>

</div>

<header class="topbar">

<div class="topbar-brand">

<span class="topbar-mark">✦</span>
<span class="topbar-name">Lumina</span>

</div>

<div class="topbar-right">

<button id="sync-btn">Sync</button>

</div>

</header>

<main class="main-content">

<section id="agenda-tab">

<h2>Agenda</h2>

<div id="agenda-list"></div>

</section>

<section id="diary-tab">

<h2>Diary</h2>

<div id="diary-list"></div>

</section>

<section id="photos-tab">

<h2>Photos</h2>

<input type="file" id="gallery-upload-input" accept="image/*">

<div id="gallery-grid"></div>

</section>

</main>
<script>
window.addEventListener("error",e=>{
console.log("GLOBAL ERROR",e.error)
})
</script>

<script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/idb@7/build/umd.js"></script>

<script type="module" src="./app.js"></script>

</body>

</html>
