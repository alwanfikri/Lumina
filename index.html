<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lumina</title>

<link rel="stylesheet" href="style.css">

<!-- FullCalendar -->

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">

<!-- Quill Editor -->

<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">

<!-- Icons -->

<link rel="icon" type="image/png" href="icon-192.png">

</head>

<body>

<!-- ===============================
HEADER
================================ -->

<header class="topbar">

<div class="brand">
Lumina
</div>

<div class="status" id="statusIndicator">
● Online
</div>

<div class="actions">

<button id="btnRefresh">
⟳
</button>

<button id="btnSettings">
⚙
</button>

</div>

</header>

<!-- ===============================
MAIN CONTENT
================================ -->

<main id="app">

<!-- ===============================
AGENDA TAB
================================ -->

<section id="agenda-tab" class="tab-content active">

<div class="page-header">
<h1>Agenda</h1>
</div>

<div id="calendar"></div>

<button class="fab" id="btnAddAgenda">
+
</button>

</section>

<!-- ===============================
DIARY TAB
================================ -->

<section id="diary-tab" class="tab-content">

<div class="page-header">
<h1>Diary</h1>
</div>

<div id="diaryList"></div>

<button class="fab" id="btnAddDiary">
+
</button>

</section>

<!-- ===============================
PHOTOS TAB
================================ -->

<section id="photos-tab" class="tab-content">

<div class="page-header">
<h1>Photos</h1>
</div>

<div id="photoGrid" class="photo-grid"></div>

<div class="upload-area">

<input type="file" id="photoInput" accept="image/*">

<button id="btnUploadPhoto">
Upload Photo
</button>

</div>

</section>

</main>

<!-- ===============================
BOTTOM NAVIGATION
================================ -->

<nav class="bottom-nav">

<button data-target="agenda">
Agenda
</button>

<button data-target="diary">
Diary
</button>

<button data-target="photos">
Photos
</button>

</nav>

<!-- ===============================
MODALS
================================ -->

<!-- Diary Editor -->

<div id="diaryModal" class="modal">

<div class="modal-content">

<input id="diaryTitle" placeholder="Title">

<div id="editor"></div>

<button id="btnSaveDiary">
Save
</button>

</div>

</div>

<!-- Agenda Editor -->

<div id="agendaModal" class="modal">

<div class="modal-content">

<input id="agendaTitle" placeholder="Event Title">

<input type="datetime-local" id="agendaStart">

<input type="datetime-local" id="agendaEnd">

<textarea id="agendaDescription" placeholder="Description"></textarea>

<button id="btnSaveAgenda">
Save
</button>

</div>

</div>

<!-- ===============================
SCRIPTS
================================ -->

<!-- FullCalendar -->

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>

<!-- Quill -->

<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

<!-- IDB -->

<script src="https://cdn.jsdelivr.net/npm/idb@7/build/umd.js"></script>

<!-- Modules -->

<script type="module" src="app.js"></script>

</body>
</html>
